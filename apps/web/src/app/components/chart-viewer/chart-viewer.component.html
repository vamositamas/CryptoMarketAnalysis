<div class="chart-viewer" [class.chart-viewer--fullscreen]="isFullscreen">
  @if (isFullscreen) {
    <button
      type="button"
      class="chart-viewer__fullscreen-toggle"
      aria-label="Exit fullscreen chart view"
      title="Exit fullscreen"
      (click)="toggleFullscreen()"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path d="M8 3v5H3"/>
        <path d="M16 3v5h5"/>
        <path d="M8 21v-5H3"/>
        <path d="M16 21v-5h5"/>
      </svg>
    </button>
  }
  <canvas
    #canvas
    aria-label="Interactive chart"
    role="img"
    (click)="handleClick($event)"
    (dblclick)="resetZoom()"
    (touchend)="handleTouchEnd($event)"
  ></canvas>
</div>
