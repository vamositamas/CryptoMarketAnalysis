<div class="app-shell">
  <header class="topbar">
    <a class="brand" [routerLink]="currentUser() ? '/dashboard' : '/'">
      <span class="brand-mark" aria-hidden="true">₿</span>
      <span i18n="Application name@@app.name">CryptoMarketAnalysis</span>
    </a>

    @if (currentUser()) {
      <nav aria-label="Primary navigation">
        <a routerLink="/dashboard" routerLinkActive="active">
          <ng-container i18n="Dashboard navigation label@@nav.dashboard">Dashboard</ng-container>
        </a>
        <a routerLink="/charts" routerLinkActive="active">
          <ng-container i18n="Charts navigation label@@nav.charts">Charts</ng-container>
        </a>
        <a routerLink="/onboarding" routerLinkActive="active">
          <ng-container i18n="Onboarding navigation label@@nav.onboarding">Onboarding</ng-container>
        </a>
        @if (currentUser()?.role === 'administrator') {
          <a routerLink="/admin/data-configuration" routerLinkActive="active">
            <ng-container i18n="Admin data navigation label@@nav.adminData">Data Admin</ng-container>
          </a>
        }
      </nav>
    }

    <div class="topbar-actions">
      <label class="language-toggle">
        <span i18n="Language selector label@@language.selector">Language</span>
        <select [value]="language" (change)="switchLanguage($event)">
          <option value="en" i18n="English language option@@language.english">English</option>
          <option value="hu" i18n="Hungarian language option@@language.hungarian">Hungarian</option>
        </select>
      </label>
      @if (!currentUser()) {
        <a class="ghost-link" routerLink="/login" i18n="Login link@@auth.login">Login</a>
        <a class="primary-link" routerLink="/register" i18n="Register link@@auth.register">Register</a>
      }
    </div>
  </header>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>
